name: Publish npm packages

on:
    push:
        tags:
            - 'ngx-simple-store-v*'
            - 'ngx-common-v*'

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'
                  cache: npm

            - run: npm ci

            - name: Select package
              id: pkg
              shell: bash
              run: |
                  if [[ "${GITHUB_REF_NAME}" == ngx-simple-store-v* ]]; then
                    echo "lib=ngx-simple-store" >> "$GITHUB_OUTPUT"
                    echo "dist=dist/ngx-simple-store" >> "$GITHUB_OUTPUT"
                  elif [[ "${GITHUB_REF_NAME}" == ngx-common-v* ]]; then
                    echo "lib=ngx-common" >> "$GITHUB_OUTPUT"
                    echo "dist=dist/ngx-common" >> "$GITHUB_OUTPUT"
                  fi

            - run: npx ng build ${{ steps.pkg.outputs.lib }}

            - run: npm install -g npm@latest

            - run: npm publish --access public
              working-directory: ${{ steps.pkg.outputs.dist }}
