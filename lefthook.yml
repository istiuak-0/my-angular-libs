pre-commit:
    parallel: true
    jobs:
        - run: pnpm oxfmt
          glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,css,scss,less,html}'
          stage_fixed: true

pre-push:
    parallel: true
    jobs:
        - run: pnpm oxfmt
          glob: '*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,css,scss,less,html}'
          stage_fixed: true
